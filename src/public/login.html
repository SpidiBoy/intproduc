<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volcano Gym - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; visibility: hidden; }
        .login-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>
<div class="container login-container">
    <div class="card shadow">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <span style="font-size:40px"></span>
                <h4 class="mt-2 fw-bold">Volcano Gym</h4>
                <p class="text-muted" style="font-size:13px">Sistema de gestión</p>
            </div>
            <div id="mensajeError" class="alert alert-danger" style="display:none;font-size:13px"></div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                <input type="text" id="username" class="form-control" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña" required>
            </div>
            <button class="btn btn-danger w-100 fw-bold" id="btnLogin" onclick="doLogin()">
                Ingresar
            </button>
        </div>
    </div>
</div>
<script src="login.js"></script>
</body>
</html>
